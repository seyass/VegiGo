<!-- base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin Panel{% endblock %}</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.11/cropper.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pFKfoA2zYal0qBPe03OYu+VGpYrAaGNu8IAG+n1zpKX3NfH6IM7UoEmzD0EIMqMl" crossorigin="anonymous"></script>
  <style>
    /* General styles */
    body {
      background-color: #333;
      color: #fff;
      font-family: Arial, sans-serif;
    }
  
    /* Navbar styles */
    .navbar-dark {
      background-color: #7755A2 !important;
      border-bottom: 1px solid #fff;
    }
  
    .navbar-dark:hover,
    .navbar-dark:focus {
      background-color: #06A245 !important;
    }
  
    /* Breadcrumb styles */
    .breadcrumb {
      background-color: #7755A2;
      padding: 10px;
      border-radius: 10px;
      display: inline-block;
      margin-bottom: 20px;
      width: auto;
    }
  
    .breadcrumb-item.active {
      color: #fff;
    }
  
    .breadcrumb-item a {
      color: #06A245 !important;
      text-decoration: none;
      transition: color 0.3s;
    }
  
    .breadcrumb-item a:hover,
    .breadcrumb-item a:focus {
      color: #fff;
    }
  
    /* Sidebar styles */
    .sidebar {
      position: fixed;
      top: 56px;
      bottom: 0;
      left: 0;
      z-index: 100;
      padding: 20px;
      width: 250px;
      background-color: #333;
      color: #fff;
      border-bottom: 10px solid #fff;
      border-top: 10px solid #fff;
      border-right: 10px solid #fff;
      border-left: 10px solid #fff;
      transition: width 0.3s ease;
      overflow-y: auto; /* Enable vertical scrollbar if content overflows */
      height: calc(100vh - 100px); /* Specific height based on viewport height */
      border-radius: 20px; /* Add border-radius to the sidebar */
    }
  
    .sidebar a {
      color: #fff;
      text-decoration: none;
      display: block;
      padding: 10px;
      border-radius: 30px;
      transition: background-color 0.3s;
    }
  
    .sidebar a:hover,
    .sidebar a:focus {
      background-color: #06A245;
    }
  
    .sidebar a.active {
      background-color: #7755A2;
    }
  
    /* Content styles */
    .content {
      margin-left: 280px;
      padding: 20px;
    }
  
    /* Logout button styles */
    .logout {
      position: fixed;
      bottom: 20px;
      left: 20px;
      border: 1px solid #fff;
      border-radius: 5px;
      padding: 10px 20px;
      transition: background-color 0.3s;
    }
  
    .logout:hover,
    .logout:focus {
      background-color: #06A245;
    }
  
    /* Table styles */
    table {
      background-color: #fff;
      color: #333;
      border-collapse: separate;
      border-spacing: 0;
      box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.1);
      border-radius: 10px; /* Add border-radius for curved corners */
      overflow: hidden; /* Hide overflow to prevent content overflow */
      width: 100%;
      max-width: 100%;
    }
  
    th,
    td {
      border: none;
      padding: 12px;
      text-align: left;
    }
  
    th {
      background-color: #f2f2f2;
    }
  
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
  
    tr:hover {
      background-color: #ddd;
    }
  
    /* Gradient button styles */
    .btn-gradient {
      background-image: linear-gradient(to right, #7755A2, #06A245);
      color: #fff;
      border-radius: 5px;
      padding: 10px 20px;
      transition: background-image 0.3s;
    }
  
    .btn-gradient:hover,
    .btn-gradient:focus {
      background-image: linear-gradient(to right, #06A245, #7755A2);
    }
  
    /* Responsive styles */
    @media screen and (max-width: 768px) {
      .sidebar {
        width: 200px;
      }
  
      .content {
        margin-left: 220px;
      }
    }
  
    @media screen and (max-width: 576px) {
      .sidebar {
        width: 150px;
      }
  
      .content {
        margin-left: 170px;
      }
    }
  </style>
  
  
  
  
  
  
  
  
  
  
</head>
<body>

<nav class="navbar navbar-dark">
  <a class="navbar-brand" href="#">Admin Panel</a>
</nav>

<div class="sidebar">
  <a href="{% url 'dashboard' %}" {% if request.path == '/dashboard/' %}class="active"{% endif %}>Dashboard</a>
  <a href="{% url 'customers' %}" {% if request.path == '/customers/' %}class="active"{% endif %}>Customers</a>
  <a href="{% url 'products' %}" {% if request.path == '/products/' %}class="active"{% endif %}>Products</a>
  <a href="{% url 'categories' %}" {% if request.path == '/categories/' %}class="active"{% endif %}>Categories</a>
  <a href="{% url 'logout_page' %}" {% if request.path == '/logout/' %}class="active"{% endif %}>Logout</a>
</div>


<div class="container mt-4 content"> <!-- Apply content class to container -->
  {% block content %}
  {% endblock %}
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.11/cropper.min.js"></script>
</body>
</html>
